name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-lint-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: fmt
      run: cargo fmt --all -- --check
    - name: lint
      run: cargo clippy
    - name: Run tests
      run: cargo test --release
